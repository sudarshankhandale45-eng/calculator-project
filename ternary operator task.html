<!doctype html>
<html>
	<head>
		<title>
			Calculate Percentage (Ternary Operator)
		</title>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	</head>
	<body class="flex justify-center items-center h-150">
		
		<div class="overflow-x-auto relative">
			<table class="min-w-full text-sm text-left text-gray-700 border border-collapse border-gray-300">
				<thead class="text-sm text-gray-700 uppercase bg-gray-100 text-center">
					<tr>
						<th scope="col" class="px-5 py-3 border border-gray-300">Subject</th>
						<th scope="col" class="px-5 py-3 border border-gray-300">Obtained Marks</th>
						<th scope="col" class="px-5 py-3 border border-gray-300">Total Mark</th>
					</tr>
				</thead>
				<tbody>
					<tr class="bg-white">
						<td class="px-7 py-3 border border-gray-300 font-medium text-gray-900">English</td>
						<td class="px-7 py-3 border border-gray-300">
							<input id="add" type="number" min="1" max="100" class="w-26 text-lg border-1 rounded-lg text-center"/>
						</td>
						<td class="px-7 py-3 border border-gray-300 text-center">100</td>
					</tr>
					<tr class="bg-white">
						<td class="px-7 py-3 border border-gray-300 font-medium text-gray-900">Marathi</td>
						<td class="px-7 py-3 border border-gray-300">
							<input id="add1" type="number" min="1" max="100" class="w-26 text-lg border-1 rounded-lg text-center"/>
						</td>
						<td class="px-7 py-3 border border-gray-300 text-center">100</td>
					</tr>
					<tr class="bg-white">
						<td class="px-7 py-3 border border-gray-300 font-medium text-gray-900">Hindi</td>
						<td class="px-7 py-3 border border-gray-300">
							<input id="add2" type="number" min="1" max="100" class="w-26 text-lg border-1 rounded-lg text-center"/>
						</td>
						<td class="px-7 py-3 border border-gray-300 text-center">100</td>
					</tr>
					<tr class="bg-white">
						<td class="px-7 py-3 border border-gray-300 font-medium text-gray-900">Math</td>
						<td class="px-7 py-3 border border-gray-300">
							<input id="add3" type="number" min="1" max="100" class="w-26 text-lg border-1 rounded-lg text-center"/>
						</td>
						<td class="px-7 py-3 border border-gray-300 text-center">100</td>
					</tr>
					<tr class="bg-white">
						<td class="px-7 py-3 border border-gray-300 font-medium text-gray-900">Science</td>
						<td class="px-7 py-3 border border-gray-300">
							<input id="add4" type="number" min="1" max="100" class="w-26 text-lg border-1 rounded-lg text-center"/>
						</td>
						<td class="px-7 py-3 border border-gray-300 text-center">100</td>
					</tr>
					<tr class="bg-white">
						<td class="px-7 py-3 border border-gray-300 font-medium text-gray-900">History</td>
						<td class="px-7 py-3 border border-gray-300">
							<input id="add5" type="number" min="1" max="100" class="w-26 text-lg border-1 rounded-lg text-center"/>
						</td>
						<td class="px-7 py-3 border border-gray-300 text-center">100</td>
					</tr>
					<thead class="text-sm text-gray-700 uppercase bg-gray-100 text-center">
						<tr>
							<th scope="col" class="px-5 py-3 border border-gray-300">Total</th>
							<th id="sum" scope="col" class="px-5 py-3 border border-gray-300"></th>
							<th scope="col" class="px-5 py-3 border border-gray-300">600</th>
						</tr>
					</thead>
					<thead class="text-sm text-gray-700 uppercase bg-green-100 text-center">
						<tr>
							<th scope="col" class="px-5 py-3 border border-gray-300">
								<button onclick="total()" class="cursor-pointer">
									CALCULATE
								</button>
							</th>
							<th id="percent" scope="col" class="px-5 py-3 border border-gray-300"></th>
							<th id="gradeid" scope="col" class="px-5 py-3 border border-gray-300"></th>
						</tr>
					</thead>
				</tbody>
			</table>
		</div>
	
		<script>
			
			function total(){
				let a = document.getElementById('add').value;
				let b = document.getElementById('add1').value;
				let c = document.getElementById('add2').value;
				let d = document.getElementById('add3').value;
				let e = document.getElementById('add4').value;
				let f = document.getElementById('add5').value;
				
				const mark = document.getElementById('sum').innerHTML = (Number(a) + Number(b) + Number(c) + Number(d) + Number(e) + Number(f));	
				
				var percentage = document.getElementById('percent').innerHTML = ((mark / 600) * 100);
				
				var answer = (percentage < 35 || a < 35 || b < 35 || c < 35 || d < 35 || e < 35 || f < 35) ? "Fail" 
							: (percentage <= 50) ? "E grade" 
							: (percentage <= 60) ? "D grade" 
							: (percentage <= 70) ? "C grade" 
							: (percentage <= 80) ? "B grade"
							: (percentage <= 100) ? "A grade" 
							: "Not Valid" ;
					
							document.getElementById('gradeid').innerHTML = answer;
			}
			
		</script>
	</body>
</html>
