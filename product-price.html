<!doctype html>
<html>
	<head>
		<title>
			Product Price Calculate
		</title>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	</head>
	<body class="flex justify-center mt-8">
		<div class="max-w-md w-full">
			<div class="bg-white rounded-2xl shadow-2xl overflow-hidden hover:shadow-3xl">
				<div class="relative">
					<div class="absolute inset-0 bg-gradient-to-br from-purple-400 to-indigo-600 opacity-75"></div>
					<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w0NzEyNjZ8MHwxfHNlYXJjaHw0fHxDb3NtaWMlMjBIZWFkcGhvbmVzfGVufDB8MHx8fDE3MjgxNTYwNTR8MA&ixlib=rb-4.0.3&q=80&w=1080" alt="Product Image" class="w-full h-64 object-cover object-center relative z-10">
					<div class="absolute top-4 right-4 bg-gray-100 text-xs font-bold px-3 py-2 rounded-full z-20 transform rotate-12">
						NEW
					</div>
				</div>
				<div class="p-6">
					<h2 class="text-3xl font-extrabold text-gray-800 mb-2">Cosmic Headphones</h2>
					<p class="text-gray-600 mb-4">Experience music with our state-of-the-art Cosmic Headphones.</p>
					<div class="flex items-center justify-between mb-4">
						<span class="text-2xl font-bold text-indigo-600">Rs.500</span>
						<div class="flex items-center">
							<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-yellow-400" viewBox="0 0 20 20" fill="currentColor">
								<path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
							</svg>
							<span class="ml-1 text-gray-600">4.9 (120 reviews)</span>
						</div>
					</div>
					<div class="w-full max-w-md min-w-[200px]">  
						<div class="relative mt-3">
							<select id="discount" class="w-full bg-transparent placeholder:text-slate-400 text-slate-700 text-sm border border-slate-200 rounded pl-3 py-2 transition duration-300 ease focus:outline-none focus:border-slate-400 hover:border-slate-400 shadow-sm focus:shadow-md appearance-none cursor-pointer">
								<option value="Select">Select Offers</option>
								<option value="10">User 10% Off</option>	
								<option value="20">Member 20% Off</option>
								<option value="30">User Plus 30% Off</option>
							</select>
							<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.2" stroke="currentColor" class="h-5 w-5 ml-1 absolute top-2.5 right-2.5 text-slate-700">
								<path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15 12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9" />
							</svg>
						</div>
					</div>
					<button onclick="btn()" class="w-full bg-indigo-600 text-white font-bold py-2 px-4 mt-5 rounded-lg hover:bg-indigo-700 transition duration-300 ease-in-out transform cursor-pointer hover:shadow-lg">
						Buy Now
					</button>
					<div id="answer" class="h-20 py-3 flex flex-col justify-center items-center px-5 mt-5 rounded-sm border hover:shadow-lg">
					</div>
				</div>
			</div>
		</div>
		
		<script>
			function btn(){
				let price = 500;
				let discount = document.getElementById('discount').value;
				let amount = discount == 10 
							? price * 10 / 100 
							: discount == 20 
							? price * 20 / 100 
							: discount == 30 
							? price * 30 / 100 
							: 0;
				let finalprice = price - amount;
				
				document.getElementById('answer').innerHTML = "Final Price = Rs. " + finalprice ;
			}
		</script>
	</body>
</html>
